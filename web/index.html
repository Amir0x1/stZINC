<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>stZINC · liquid staked ZINC</title>
    <style>
      :root { --bg:#0b0e13; --card:#151a23; --line:#252c39; --fg:#e6edf3; --muted:#8b96a5; --accent:#5ad1a0; --accent2:#3b82f6; }
      * { box-sizing: border-box; }
      body { margin:0; background:var(--bg); color:var(--fg); font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
      .wrap { max-width:520px; margin:0 auto; padding:32px 18px 80px; }
      header { display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; gap:12px; }
      h1 { font-size:22px; margin:0; letter-spacing:.5px; }
      h1 small { color:var(--muted); font-weight:400; font-size:13px; display:block; }
      button { font:inherit; font-weight:600; border:0; border-radius:10px; padding:11px 16px; cursor:pointer; color:#06210f; background:var(--accent); transition:.15s; }
      button:disabled { opacity:.45; cursor:not-allowed; }
      button:hover:not(:disabled) { filter:brightness(1.08); }
      .card { background:var(--card); border:1px solid var(--line); border-radius:16px; padding:18px; margin-bottom:16px; }
      .stats { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; text-align:center; }
      .stat .k { color:var(--muted); font-size:12px; }
      .stat .v { font-size:17px; font-weight:700; margin-top:2px; }
      label { color:var(--muted); font-size:13px; }
      .row { display:flex; gap:10px; margin-top:8px; }
      input { flex:1; background:#0b0e13; border:1px solid var(--line); color:var(--fg); border-radius:10px; padding:11px 12px; font:inherit; width:100%; }
      .tabs { display:flex; gap:8px; margin-bottom:14px; }
      .tabs button { flex:1; background:#0b0e13; color:var(--muted); border:1px solid var(--line); }
      .tabs button.active { background:var(--accent); color:#06210f; border-color:var(--accent); }
      .muted { color:var(--muted); font-size:12px; }
      a { color:var(--accent2); }
      #log { font-family:ui-monospace,monospace; font-size:12px; white-space:pre-wrap; word-break:break-all; color:var(--muted); margin-top:14px; min-height:20px; }
      .maxbtn { background:#0b0e13; color:var(--muted); border:1px solid var(--line); padding:0 12px; }
      /* keep the wallet-adapter button on-theme */
      .wallet-adapter-button-trigger { background:var(--accent2) !important; color:#fff !important; border-radius:10px !important; height:auto !important; padding:11px 16px !important; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
